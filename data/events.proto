syntax = "proto3";

package aic_fred_website;

// Represents a single event
message Event {
  int32 id = 1;
  string title = 2;
  string date = 3;
  string time = 4;
  string location = 5;
  string description = 6;
  string category = 7;
  string image = 8;
  string register = 9;
}

// Represents the array of events
message EventList {
  repeated Event events = 1;
}
